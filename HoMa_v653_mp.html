<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

  --text-primary:#ddd8c8;--text-secondary:#6a6a80;--text-muted:#3a3a4a;
  --gold:#dcb450;--gold-light:#f0d878;--gold-dark:#9a7a30;
  --border-main:rgba(220,180,80,.12);--border-subtle:rgba(220,180,80,.07);
  --border-card:rgba(220,180,80,.1);--border-btn:rgba(255,255,255,.07);
  --scrollbar:#3a3048;--shadow:rgba(0,0,0,.7);
  --stat-text:#ddd8c8;--stat-bg:transparent;
}
.theme-light{
  --bg-primary:#ede8df;--bg-secondary:rgba(200,192,178,.45);--bg-card:rgba(0,0,0,.045);
  --bg-overlay:rgba(240,236,228,.92);--bg-modal:linear-gradient(135deg,#f2eee6,#e8e2d6);
  --bg-input:rgba(0,0,0,.07);--bg-hover:rgba(0,0,0,.05);
  --text-primary:#1a1510;--text-secondary:#4a4438;--text-muted:#7a7468;
  --gold:#6a4a10;--gold-light:#7a5818;--gold-dark:#4a3008;

  --border-card:rgba(60,40,10,.22);--border-btn:rgba(0,0,0,.2);
  --scrollbar:#a09888;--shadow:rgba(0,0,0,.18);
  --stat-text:#1a1510;--stat-bg:transparent;
}
html,body{width:100%;min-height:100%;background:var(--bg-primary)}
body{color:var(--text-primary);font-family:'Be Vietnam Pro',sans-serif;font-size:16px;-webkit-tap-highlight-color:transparent}
#root{width:100%;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes popIn{0%{transform:scale(0) rotate(-180deg);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes autoFlash{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes emojiAttack{0%{transform:scale(1) translateX(0)}30%{transform:scale(1.35) translateX(24px)}60%{transform:scale(1.08) translateX(-4px)}100%{transform:scale(1) translateX(0)}}
@keyframes emojiSkill{0%{transform:scale(1) rotate(0)}15%{transform:scale(1.5) rotate(-10deg)}40%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
@keyframes enemyHit{0%{transform:scale(1);filter:none}20%{transform:scale(.82);filter:brightness(2.5) saturate(0)}100%{transform:scale(1);filter:none}}
@keyframes emojiDeath{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) rotate(-90deg)}}
@keyframes idleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes castBurst{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}
@keyframes readyGlow{0%,100%{box-shadow:0 0 8px rgba(220,180,80,.15)}50%{box-shadow:0 0 24px rgba(220,180,80,.6)}}
@keyframes stageWipe{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
@keyframes goldPulse{0%,100%{text-shadow:0 0 8px rgba(220,180,80,.25)}50%{text-shadow:0 0 24px rgba(220,180,80,.85)}}
@keyframes crPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
@keyframes enragePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35) saturate(1.4)}}
.btn{cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;border-radius:8px;transition:all .14s;touch-action:manipulation}
.btn:disabled{opacity:.22;cursor:not-allowed}.btn:not(:disabled):active{transform:scale(.96);filter:brightness(.88)}
.fade-in{animation:fadeIn .25s ease-out}.pop-in{animation:popIn .35s ease-out forwards}
.game-layout{display:grid;grid-template-columns:260px 1fr 340px;grid-template-rows:auto 1fr auto;height:100vh;gap:0}
.game-header{grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border-main);background:var(--bg-primary);backdrop-filter:blur(5px);position:sticky;top:0;z-index:100}
.left-col{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:6px;padding:6px;overflow:hidden;border-right:1px solid var(--border-subtle);background:var(--bg-secondary);overflow-y:auto}
.center-col{grid-column:2;grid-row:2;display:flex;flex-direction:column;gap:6px;padding:8px 10px;overflow-y:auto}
.right-col{grid-column:3;grid-row:2;display:flex;flex-direction:column;gap:6px;padding:6px;overflow:hidden;border-left:1px solid var(--border-subtle);background:var(--bg-secondary);overflow-y:auto}
.bottom-row{grid-column:1/-1;grid-row:3;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 10px;border-top:1px solid var(--border-main);background:var(--bg-secondary);max-height:45vh;overflow-y:auto}
@media(max-width:1200px){.game-layout{grid-template-columns:240px 1fr 260px}}
@media(max-width:899px){
  .game-layout{grid-template-columns:1fr;grid-template-rows:auto auto auto auto;height:auto}
  .left-col,.center-col,.right-col{grid-column:1;max-height:none}
  .center-col{grid-row:2}.left-col{grid-row:3}.right-col{grid-row:4}
  .bottom-row{grid-column:1;grid-row:5;grid-template-columns:1fr}
}
.slbl{font-size:11px;letter-spacing:2.5px;color:#6a6a80;padding:3px 0;text-transform:uppercase;font-weight:600}
.card{background:var(--bg-card);border:1px solid var(--border-card);border-radius:10px;padding:12px 14px;position:relative}
.arena{background:linear-gradient(180deg,#141428,#181830,#1c1c38);border:1px solid rgba(220,180,80,.1);border-radius:12px;position:relative;overflow:hidden;min-height:140px}
.skill-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.skill-btn{padding:10px 6px 8px;border-radius:10px;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;font-size:13px;transition:all .14s;text-align:center;border:1px solid;min-height:70px}
.skill-btn:disabled{opacity:.18;cursor:not-allowed}.skill-btn:not(:disabled):active{transform:scale(.95)}
.auto-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:1px;border:1px solid;min-width:80px;justify-content:center}
.auto-btn.on{background:rgba(68,200,120,.15);border-color:rgba(68,200,120,.45);color:#44cc88;animation:autoFlash 1.8s infinite}
.auto-btn.off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);color:#555}
.speed-btn{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid;min-width:42px;text-align:center}
.speed-btn.active{background:rgba(220,180,80,.22);border-color:rgba(220,180,80,.45);color:#dcb450}
.speed-btn.inactive{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06);color:#444}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600;letter-spacing:.5px}
.tag-atk{color:#ff8844;background:rgba(255,136,68,.12);border:1px solid rgba(255,136,68,.25)}
.tag-def{color:#55aaff;background:rgba(85,170,255,.12);border:1px solid rgba(85,170,255,.25)}
.tag-hp{color:#44cc88;background:rgba(68,204,136,.12);border:1px solid rgba(68,204,136,.25)}
.tag-spd{color:#ffcc44;background:rgba(255,204,68,.12);border:1px solid rgba(255,204,68,.25)}
.tag-crt{color:#ff6688;background:rgba(255,102,136,.12);border:1px solid rgba(255,102,136,.25)}
.tag-dot{color:#88ff44;background:rgba(136,255,68,.1);border:1px solid rgba(136,255,68,.2)}
.tag-cc{color:#cc88ff;background:rgba(204,136,255,.1);border:1px solid rgba(204,136,255,.2)}
.tag-eff{color:#ffaa88;background:rgba(255,170,136,.1);border:1px solid rgba(255,170,136,.2)}
.locked-badge{position:absolute;top:2px;right:2px;font-size:10px;z-index:3;cursor:pointer}
.gear-score{font-size:10px;color:#dcb450;background:rgba(220,180,80,.1);border-radius:3px;padding:1px 4px}
.dust-counter{font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}

.high-contrast{filter:contrast(1.4) saturate(1.2)}
.high-contrast .card{border-color:rgba(220,180,80,.35)!important}

.high-contrast .btn{border-color:rgba(255,255,255,.4)!important}

/* v6.5.3: Light mode — comprehensive high-contrast overrides */
.theme-light .arena{background:linear-gradient(180deg,#d8d2c6,#e0dbd0,#d8d2c6);border:1px solid rgba(60,40,10,.18)}
.theme-light .slbl{color:#4a4438}
.theme-light .card{background:rgba(255,255,255,.6);border-color:rgba(60,40,10,.22)!important;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.theme-light .btn{color:#1a1410}
.theme-light .btn:not(:disabled):active{filter:brightness(1.08)}
.theme-light .game-header{border-bottom-color:rgba(60,40,10,.2)!important;background:#e8e3da}
.theme-light .gear-score{color:#5a3a08;background:rgba(90,58,8,.15)}
.theme-light .dust-counter{color:#3a2a08}
.theme-light .skill-btn{background:rgba(255,255,255,.55)!important;border-color:rgba(60,40,10,.2)!important;color:#1a1510!important}
.theme-light .skill-btn:disabled{background:rgba(0,0,0,.04)!important;color:#aaa!important}
.theme-light .auto-btn.on{background:rgba(20,80,40,.15);border-color:rgba(20,80,40,.4);color:#145028}
.theme-light .auto-btn.off{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.16);color:#777}
.theme-light .speed-btn.active{background:rgba(90,58,8,.18);border-color:rgba(90,58,8,.45);color:#5a3a08}
.theme-light .speed-btn.inactive{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.12);color:#777}
.theme-light .tag-atk{color:#a03010;background:rgba(160,48,16,.12);border-color:rgba(160,48,16,.3)}
.theme-light .tag-def{color:#144878;background:rgba(20,72,120,.12);border-color:rgba(20,72,120,.3)}
.theme-light .tag-hp{color:#105538;background:rgba(16,85,56,.12);border-color:rgba(16,85,56,.3)}
.theme-light .tag-spd{color:#6a4a08;background:rgba(106,74,8,.12);border-color:rgba(106,74,8,.3)}
.theme-light .tag-crt{color:#881430;background:rgba(136,20,48,.12);border-color:rgba(136,20,48,.3)}
.theme-light .tag-dot{color:#2a4508;background:rgba(42,69,8,.1);border-color:rgba(42,69,8,.25)}
.theme-light .tag-cc{color:#441898;background:rgba(68,24,152,.1);border-color:rgba(68,24,152,.25)}
.theme-light .tag-eff{color:#883610;background:rgba(136,54,16,.1);border-color:rgba(136,54,16,.25)}
/* v6.5.3: Force dark text/numbers on all light mode elements */
.theme-light .left-col,.theme-light .right-col,.theme-light .center-col,.theme-light .bottom-row{color:#1a1410}
.theme-light .left-col *,.theme-light .right-col *,.theme-light .bottom-row *{--forced-light:1}
.theme-light select{background:rgba(255,255,255,.7);color:#1a1410;border-color:rgba(60,40,10,.2)}
.theme-light input{background:rgba(255,255,255,.7);color:#1a1410;border-color:rgba(60,40,10,.2)}
.theme-light .locked-badge{background:rgba(255,255,255,.8);border-radius:3px}

.btn:focus-visible{outline:2px solid #dcb450;outline-offset:2px}
select:focus-visible{outline:2px solid #dcb450;outline-offset:1px}
input:focus-visible{outline:2px solid #dcb450;outline-offset:1px}
</style>

function getElemTitle(elemId,mlv){
  const titles=ELEM_TITLES[elemId];if(!titles)return"";
  if(mlv>=100)return titles[4];if(mlv>=70)return titles[3];if(mlv>=40)return titles[2];if(mlv>=20)return titles[1];if(mlv>=10)return titles[0];return"";
}

// v6.4.4.2: Wuxing cycle: Fire→Metal→Wood→Earth→Water→Fire
function elemMult(p,b){
  if(!p||!b||p===b)return 1;
  const pe=ELEM_MAP[p];if(!pe)return 1;
  if(pe.counters===b)return 1.28;
  if(pe.weakTo===b)return 0.80;
  return 1;
}
function isCountered(p,b){if(!p||!b)return false;const e=ELEM_MAP[p];return e&&e.weakTo===b}

// v6.3: Element mastery system
const MAX_MASTERY=100;
const MASTERY_EXP_FOR=lv=>Math.floor(20+lv*15+lv*lv*0.8);
function getMasteryBonuses(elemId,masteryLv){
  const el=ELEM_MAP[elemId];if(!el)return{};
  const b={atkPct:0,hpPct:0,defPct:0,critR:0,critD:0,eff:0,effRes:0,spd:0,pierce:0,dmgReduce:0,lifesteal:0,burnDmg:0,healPow:0,dotDmg:0,elemDmg:0,elemHeal:0,elemDot:0,elemCrit:0,defAtk:0,hpShield:0};
  (el.masteryBonus||[]).forEach(mb=>{
    if(masteryLv>=mb.lv){
      if(b[mb.stat]!==undefined)b[mb.stat]+=mb.val;
      if(mb.extra)Object.entries(mb.extra).forEach(([k,v])=>{if(b[k]!==undefined)b[k]+=v});
    }
  });
  // v6.4: Late mastery bonus (lv>50 gets 50% stronger bonuses)
  if(masteryLv>50){const boost=1+(masteryLv-50)*0.01;Object.keys(b).forEach(k=>{if(typeof b[k]==="number"&&b[k]>0)b[k]=Math.round(b[k]*boost)})}
  return b;
}


// v6.4.4.2: Negative Elemental Path — picking an element weakens its counter target
// v6.5.3: Negative path does NOT affect element damage multiplier (elemMult stays 1.28/0.80)
// Negative penalties only affect flat stats (ATK%, DEF%, etc.) at milestone levels
const ELEM_COUNTER_MAP={fire:"metal",metal:"wood",wood:"earth",earth:"water",water:"fire"};
function getNegativeElemLevel(elemId,masteryLv){
  // Every 10 mastery levels = 10 levels of negative effect on countered element
  // Max negative level: 50 (at mastery 50+)
  return Math.min(50,Math.floor((masteryLv||0)/1)*1); // 1:1 ratio, cap 50
}
function getNegativeElemBonuses(elemId,masteryLv){
  const negLv=getNegativeElemLevel(elemId,masteryLv);
  const b={atkPct:0,hpPct:0,defPct:0,critR:0,spd:0,eff:0,effRes:0};
  // Every 10 negative levels = a penalty milestone
  if(negLv>=10){b.atkPct-=3;b.defPct-=2}
  if(negLv>=20){b.hpPct-=3;b.spd-=2}
  if(negLv>=30){b.eff-=5;b.effRes-=3}
  if(negLv>=40){b.critR-=3;b.atkPct-=4}
  if(negLv>=50){b.hpPct-=5;b.defPct-=4;b.spd-=3}
  return b;
}

const T2_SKILL_LIB=(()=>{
  const lib={};const schools=MARTIAL_SCHOOLS;const n=schools.length;
  // Naming fragments for T2 skill generation
  const COMBO_PREFIX=["Divine","Shadow","Storm","Void","Crimson","Celestial","Phantom","Primal","Eternal","Infernal"];
  const COMBO_SUFFIX=["Strike","Wave","Burst","Rend","Crash","Pulse","Dance","Fury","Chain","Rift"];
  const COMBO_ICONS=["⚡","🔥","💨","🪨","🌑","🐍","⛰️","⭐","🩸","🔮","☄","💀","🌊","🌀","💥","🌟","❄","🌋","⬛","💫"];
  // Generate unique T2 skill from two parent skills
  function genT2(sA,sB,slot,idxA,idxB,pairIdx){
    const isSelf=idxA===idxB;
    // v6.4.4.2: Self-combo gets +5% mastery bonus to scaling stat
    const prefix=sA;const secondary=sB;
    // Combine names
    const nameA=prefix.name.split(' ')[0]||prefix.name.slice(0,5);
    const nameB=secondary.name.split(' ')[0]||secondary.name.slice(0,5);
    const cName=isSelf?`${nameA} Mastery`:`${nameA}·${nameB}`;
    const selfBonus=isSelf?1.05:1.0; // +5% for self-combo
    // Power: weighted average with 12% T2 bonus
    // v6.4.4.2: T2 power bonus diminishes with skill level (12%@+0, 10%@+5, 8%@+10, 6%@+15)
    const t2Bonus=1.12; // base bonus, reduced at upgrade time
    const basePow=((prefix.power||1)*0.6+(secondary.power||1)*0.4)*t2Bonus*selfBonus;
    // CD: from prefix, slightly reduced
    const baseCd=slot===0?0:Math.max(1,Math.floor((prefix.cd||0)*0.9));
    // AoE: inherit from prefix, or secondary if AoE
    const isAoe=prefix.aoe||(secondary.aoe&&Math.abs(pairIdx%3)===2);
    // Effect: combine — prefer prefix, secondary as fallback
    let eff=prefix.eff||secondary.eff||null;
    let effChance=(prefix.effChance||0)+(secondary.effChance||0)*0.3;
    if(!eff&&secondary.eff){eff=secondary.eff;effChance=secondary.effChance||20}
    // Type: inherit prefix with T2 marker
    const type=prefix.type||"atk";
    // Icon: mix
    const iconPool=[prefix.icon,secondary.icon,...COMBO_ICONS];
    const icon=iconPool[(idxA*3+idxB*7+slot*13+pairIdx)%iconPool.length];
    // Desc
    const effDesc=eff?` [${EFFECTS[eff]?.name||eff}]`:"";
    const aoeDesc=isAoe?" AoE":"";
    const desc=`T2: ${cName}${aoeDesc}${effDesc}`;
    const skId=`t2_${idxA}_${idxB}_${slot}_${pairIdx}`;
    // v6.5.3: ~30% of T2 skills get proactive heal or shield (not attack-based)
    let proactiveHeal=0,proactiveShield=0;
    const proRoll=(idxA*7+idxB*13+slot*5+pairIdx*11)%10; // deterministic 0-9
    if(proRoll<2){proactiveHeal=3+Math.floor(proRoll*1.5)} // ~20% get heal (3-4%)
    else if(proRoll<3){proactiveShield=4+Math.floor(pairIdx%3)*2} // ~10% get shield (4-8%)
    return{id:skId,name:cName,icon,type,power:+basePow.toFixed(3),cd:baseCd,aoe:isAoe,
      desc:desc+(proactiveHeal?` Heal ${proactiveHeal}%`:"")+(proactiveShield?` Shield ${proactiveShield}%`:""),
      eff,effChance:Math.floor(effChance),
      parentA:{school:idxA,slot:slot},parentB:{school:idxB,slot:pairIdx%3},
      tier:2,proactiveHeal:proactiveHeal||undefined,proactiveShield:proactiveShield||undefined};
  }
  // Generate all 435 T2 skills
  const allT2=[];
  for(let a=0;a<n;a++){
    for(let b=a;b<n;b++){
      if(a===b){
        // Self-combo: 1 per slot = 3 skills
        for(let s=0;s<3;s++){
          allT2.push(genT2(schools[a].moves[s],schools[a].moves[s],s,a,b,s));
        }
      }else{
        // Cross-combo: 3 per slot = 9 skills
        for(let s=0;s<3;s++){
          for(let k=0;k<3;k++){
            allT2.push(genT2(schools[a].moves[s],schools[b].moves[k],s,a,b,k));
          }
        }
      }
    }
  }
  // Index by pair
  allT2.forEach(sk=>{
    const key=`${sk.parentA.school}_${sk.parentB.school}`;
    if(!lib[key])lib[key]=[];
    lib[key].push(sk);
  });
  lib._all=allT2;
  // Generate T2 branches (upgrade milestones +5/10/15)
  // v6.4.4.2: Diversified T2 branches per slot
  function genBranches(sk){
    const b={};
    b[0]={ // S1 branches — focus on basic attack enhancement
      5:[{n:"Sharpen",d:"+20% power",f:m=>({...m,power:+(m.power*1.2).toFixed(3)})},
          {n:"Swift",d:"+8 SPD",f:m=>({...m,spdBonus:(m.spdBonus||0)+8})}],
      10:[{n:"Precision",d:"+30% power",f:m=>({...m,power:+(m.power*1.3).toFixed(3)})},
           {n:"Lethal",d:"+18% CRT +10% CDM",f:m=>({...m,bonusCrit:(m.bonusCrit||0)+18,bonusCritD:(m.bonusCritD||0)+10})}],
      15:[{n:"Perfect S1",d:"+50% power",f:m=>({...m,power:+(m.power*1.5).toFixed(3)})},
           {n:"Dual Nature",d:"+20% dual atk chance",f:m=>({...m,dualAtkBonus:20})}]
    };
    b[1]={ // S2 branches — focus on utility/control
      5:[{n:"Expand",d:"+18% power",f:m=>({...m,power:+(m.power*1.18).toFixed(3)})},
          {n:"Control",d:"+15% EFF",f:m=>({...m,bonusEff:(m.bonusEff||0)+15})}],
      10:[{n:"Dominate",d:"+28% power +AoE",f:m=>({...m,power:+(m.power*1.28).toFixed(3),aoe:true})},
           {n:"Lockdown",d:"CR delay 20%",f:m=>({...m,crDelay:(m.crDelay||0)+20})}],
      15:[{n:"Overwhelm",d:"+45% power -2CD",f:m=>({...m,power:+(m.power*1.45).toFixed(3),cd:Math.max(1,m.cd-2)})},
           {n:"Cascade",d:"Multi-debuff chain",f:m=>({...m,multiDebuff:true})}]
    };
    b[2]={ // S3 branches — focus on ultimate power
      5:[{n:"Charge",d:"+15% power",f:m=>({...m,power:+(m.power*1.15).toFixed(3)})},
          {n:"Recover",d:"+8% lifesteal",f:m=>({...m,lifestealBonus:8})}],
      10:[{n:"Unleash",d:"+35% power",f:m=>({...m,power:+(m.power*1.35).toFixed(3)})},
           {n:"Harmony",d:"+15% CRT +20% CDM",f:m=>({...m,bonusCrit:(m.bonusCrit||0)+15,bonusCritD:(m.bonusCritD||0)+20})}],
      15:[{n:"Transcend",d:"+55% power (T2 bonus kept)",f:m=>({...m,power:+(m.power*1.55).toFixed(3)})},
           {n:"Pinnacle",d:"+30% CDM -3CD",f:m=>({...m,bonusCritD:(m.bonusCritD||0)+30,cd:Math.max(2,m.cd-3)})}]
    };
    return b;
  }
  lib._branches=genBranches;
  console.log(`[HoMa] T2 Library: ${allT2.length} skills generated`);
  return lib;
})();
// Get T2 skills for a pair of schools (by index)
function getT2Skills(idxA,idxB){
  const a=Math.min(idxA,idxB),b=Math.max(idxA,idxB);
  return T2_SKILL_LIB[`${a}_${b}`]||[];
}

function runPvPCombat(p1,p2,prio1,prio2,maxTurns=200){

  let cd1=m1.map(()=>0),cd2=m2.map(()=>0);
  let defBuff1=0,defBuff2=0;
  const{bonuses:b1}=getSetBonuses(p1.equips);const{bonuses:b2}=getSetBonuses(p2.equips);
  const dmgReduce1=(b1.dmgReduce||0)/100;const dmgReduce2=(b2.dmgReduce||0)/100;
  log.push({msg:`⚔ PVP START — Balanced Mode (equal base stats, no element advantage)`,cls:"sys"});
  log.push({msg:`P1: ${s1.hp}HP ${s1.atk}ATK ${s1.spd}SPD ${s1.critR}%CRT`,cls:"skill"});
  log.push({msg:`P2: ${s2.hp}HP ${s2.atk}ATK ${s2.spd}SPD ${s2.critR}%CRT`,cls:"boss"});
  // Skill priority selection function
  const pickSkill=(moves,cds,prio)=>{
    // prio = [0,1,2] order of priority (index 0 = highest)
    if(prio&&prio.length>0){
      for(const idx of prio){if(idx>=0&&idx<moves.length&&cds[idx]<=0)return idx}
    }
    // Fallback: highest power available
    let mi=0;let bestPow=0;
    for(let j=moves.length-1;j>=0;j--){if(cds[j]<=0&&(moves[j].power||0)>bestPow){bestPow=moves[j].power||0;mi=j}}
    if(bestPow===0){for(let j=0;j<moves.length;j++){if(cds[j]<=0){mi=j;break}}}
    return mi;
  };

    if(SD_MILESTONES.includes(turn)){

    const t1=(100-cr1)/crFillRate(s1.spd);const t2=(100-cr2)/crFillRate(s2.spd);
    const ticks=Math.min(t1,t2);
    cr1=Math.min(100,cr1+crFillRate(s1.spd)*ticks);
    cr2=Math.min(100,cr2+crFillRate(s2.spd)*ticks);
    const isP1=cr1>=100&&(cr1>=cr2||cr2<100);
    const pName=isP1?"P1":"P2";
    if(isP1)cr1=0;else cr2=0;
    const tickCd=cd=>cd.map(c=>Math.max(0,c-1));
    if(isP1){cd1=tickCd(cd1)}else{cd2=tickCd(cd2)}
    // Pick skill using priority
    const moves=isP1?m1:m2;const cds=isP1?cd1:cd2;
    const mi=pickSkill(moves,cds,isP1?prio1:prio2);
    const move=moves[mi];
    if(isP1){cd1=cd1.map((c,i)=>i===mi?(mi===0?0:move.cd||0):c)}
    else{cd2=cd2.map((c,i)=>i===mi?(mi===0?0:move.cd||0):c)}
    // Damage — NO element multiplier in balanced PvP
    const atkS=isP1?s1:s2;const defS=isP1?s2:s1;
    const defVal=defS.def+((isP1?defBuff2:defBuff1)>0?Math.floor(defS.def*0.5):0);
    let dmg=Math.max(1,Math.floor(atkS.atk*(move.power||1.0)-defVal*0.35));
    const isCrit=Math.random()*100<atkS.critR;
    if(isCrit)dmg=Math.floor(dmg*atkS.critD/100);
    // v6.5.3: Sudden Death bonus
    if(sdBonus>0)dmg=Math.floor(dmg*(1+sdBonus/100));
    const dr=isP1?dmgReduce2:dmgReduce1;
    dmg=Math.max(1,Math.floor(dmg*(1-dr)));
    let fd=dmg;
    if(isP1){if(shield2>0){const ab=Math.min(shield2,fd);shield2-=ab;fd-=ab}hp2=Math.max(0,hp2-fd)}
    else{if(shield1>0){const ab=Math.min(shield1,fd);shield1-=ab;fd-=ab}hp1=Math.max(0,hp1-fd)}
    // Lifesteal
    const bSet=isP1?b1:b2;
    if(bSet.lifesteal>0){const ls=Math.floor(dmg*bSet.lifesteal/100);
      if(isP1)hp1=Math.min(s1.hp,hp1+ls);else hp2=Math.min(s2.hp,hp2+ls)}
    // Buff handling
    if(move.type?.includes("buff_def")){if(isP1)defBuff1=3;else defBuff2=3}
    if(move.type?.includes("buff_reflect_shield")){
      const shAmt=Math.floor((isP1?s1.hp:s2.hp)*0.15);
      if(isP1){defBuff1=3;shield1=Math.min(s1.hp,shield1+shAmt)}
      else{defBuff2=3;shield2=Math.min(s2.hp,shield2+shAmt)}}
    if(isP1&&defBuff2>0)defBuff2--;if(!isP1&&defBuff1>0)defBuff1--;
    log.push({msg:`${pName} ${move.icon||"⚔"} ${move.name}: ${dmg}${isCrit?" CRIT!":""}${fd<dmg?" (🔷-"+(dmg-fd)+")":""}`,
      cls:isP1?"skill":"boss"});
    log.push({msg:`  HP: P1 ${hp1}/${s1.hp}${shield1>0?" 🔷"+shield1:""} | P2 ${hp2}/${s2.hp}${shield2>0?" 🔷"+shield2:""}`,cls:"sys"});
    if(hp1<=0)return{winner:2,log,turns:turn+1,hp1:0,hp2,s1,s2};
    if(hp2<=0)return{winner:1,log,turns:turn+1,hp1,hp2:0,s1,s2};
  }
  return{winner:hp1/s1.hp>=hp2/s2.hp?1:2,log,turns:maxTurns,hp1,hp2,s1,s2,timeout:true};
}

// EQUIPMENT CREATION
function rollRarity(stage=1,mode="normal"){
  const boost=(mode==="endless"?3:0)+Math.floor((stage-1)/3);
  const w=[40,24,18,11,5,2].map((v,i)=>i===0?v:Math.min(v+boost,45));
  w[0]=Math.max(6,100-w.slice(1).reduce((a,b)=>a+b,0));
  const tot=w.reduce((a,b)=>a+b,0);let r=Math.random()*tot;
  for(let i=0;i<RARITIES.length;i++){r-=w[i];if(r<=0)return RARITIES[i]}
  return RARITIES[0];
}
function makeEquip(stage=1,mode="normal"){
  const rarity=rollRarity(stage,mode);const ri=RARITIES.indexOf(rarity);const cfg=RARITY_CONFIG[rarity];
  const slotDef=EQUIP_SLOTS[Math.floor(Math.random()*6)];
  const mainPool=SLOT_MAIN[slotDef.id];const mainStat=mainPool[Math.floor(Math.random()*mainPool.length)];
  const mr=MAIN_RANGE[rarity][mainStat]||[1,5];const mainVal=rng(mr[0],mr[1]);
  const subPool=shuffle(SLOT_SUBS[slotDef.id].filter(s=>s!==mainStat));
  const totalSubs=rarity==="epic"?4:cfg.subCount;
  const allSubStats=subPool.slice(0,Math.min(totalSubs,subPool.length)).map(k=>{
    const sr=SUB_RANGE[rarity][k]||[1,3];return{key:k,val:rng(sr[0],sr[1]),rolls:0}});
  const setId=EQUIP_SETS[Math.floor(Math.random()*EQUIP_SETS.length)].id;
  const names=["Worn","Refined","Superior","Epic","Legendary","Divine"];
  return{id:uid(),type:"equip",slot:slotDef.id,slotName:slotDef.name,rarity,icon:SLOT_ICON[slotDef.id],
    displayName:`${names[ri]} ${slotDef.name}`,mainStat,mainVal,allSubStats,level:0,cp:R_CP[rarity],setId,locked:false};
}
function getVisibleSubCount(e){
  const cfg=RARITY_CONFIG[e.rarity];if(!cfg)return 0;

// v6.3: Gear Score for quick comparison
function calcGearScore(e){
  if(!e||e.type!=="equip")return 0;

}

function makeEnhanceStone(){return{id:uid(),type:"special",subtype:"enhance_stone",stackable:true,name:"Enhance Stone",icon:"💎",rarity:"epic",desc:"Enhance +15 gear: boost all stats",cp:0}}
function makeReforgeStone(){return{id:uid(),type:"special",subtype:"reforge_stone",stackable:true,name:"Reforge Stone",icon:"🔄",rarity:"rare",desc:"Reroll 1 sub on +15 gear",cp:0}}
function addToInv(inv,item){

function getSetBonuses(equips){
  const counts={};equips.forEach(e=>{if(e&&e.setId)counts[e.setId]=(counts[e.setId]||0)+1});
  const bonuses={atkPct:0,hpPct:0,defFlat:0,defPct:0,spd:0,pierce:0,critR:0,critD:0,dmgReduce:0,extraTurn:0,lifesteal:0,reflect:0,eff:0,effRes:0,shieldPct:0,defBreak:0,dualAtk:0,fortify:0,counterChance:0,dodgeChance:0,hpRegen:0,nullifyOnDodge:0};
  const activeNames=[];
  Object.entries(counts).forEach(([sid,cnt])=>{
    const set=SET_MAP[sid];if(!set)return;
    const apply=b=>{if(!b)return;Object.entries(b).forEach(([k,v])=>{if(k!=="desc"&&bonuses[k]!==undefined)bonuses[k]+=v})};
    // v6.5.3: Support b2/b3/b4/b6 mixed formats
    if(cnt>=6&&set.b6){apply(set.b6);activeNames.push(`${set.icon}${set.name} 6`)}

function getEquipStats(equips){
  let s={hpFlat:0,hpPct:0,atkFlat:0,atkPct:0,defFlat:0,defPct:0,critR:0,critD:0,spd:0,eff:0,effRes:0,hpRegen:0};
  equips.forEach(e=>{if(!e)return;
    const mainMult=1+e.level*0.08;const add=(k,v)=>{if(s[k]!==undefined)s[k]+=v};
    add(e.mainStat,Math.round(e.mainVal*mainMult));
    const vis=getVisibleSubCount(e);
    (e.allSubStats||[]).slice(0,vis).forEach(sub=>add(sub.key,sub.val));
  });
  const{bonuses}=getSetBonuses(equips);
  s.atkPct+=bonuses.atkPct||0;s.hpPct+=bonuses.hpPct||0;s.defFlat+=bonuses.defFlat||0;s.defPct+=bonuses.defPct||0;
  s.spd+=bonuses.spd||0;s.critR+=bonuses.critR||0;s.critD+=bonuses.critD||0;s.eff+=bonuses.eff||0;s.effRes+=bonuses.effRes||0;
  return s;
}
function calcBaseAtk(stage,cl=1){return Math.floor(12+stage*3.5+charBonus(cl).atk)}
function calcBaseHp(stage,cl=1){return Math.floor(250+stage*18+charBonus(cl).hp)}
function calcBaseDef(cl=1){return Math.floor(charBonus(cl).def)}
function calcAtk(equips,stage,cl=1,buffs,mastery,negBonus){
  const b=calcBaseAtk(stage,cl);const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};const nb=negBonus||{};
  return Math.floor((b+es.atkFlat)*(1+(es.atkPct+bb.atkPct+(mb.atkPct||0)+(nb.atkPct||0))/100));
}
function calcMaxHp(equips,stage,cl=1,buffs,mastery){
  const b=calcBaseHp(stage,cl);const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};
  return Math.floor((b+es.hpFlat)*(1+(es.hpPct+bb.hpPct+(mb.hpPct||0))/100));
}
// v6.4.4.2: DEF% strengthened — multiplicative bonus increased
function calcDef(equips,cl=1,buffs,mastery){
  const b=calcBaseDef(cl);const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};
  return Math.floor((b+es.defFlat+bb.defFlat)*(1+(es.defPct+(mb.defPct||0))/100)*(1+(bb.defPct||0)/200));
}
const SPD_BASE=1000;
function crFillRate(spd){return spd/SPD_BASE}
function calcSpd(equips,buffs,mastery){
  const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};
  return 100+es.spd+bb.spd+(mb.spd||0);
}
function calcEff(equips,buffs,mastery){const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};return es.eff+(bb.eff||0)+(mb.eff||0)}
function calcEffRes(equips,buffs,mastery){const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};return es.effRes+(bb.effRes||0)+(mb.effRes||0)}
function calcCritR(equips,buffs,mastery){const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};return 5+es.critR+(bb.critR||0)+(mb.critR||0)}
function calcCritD(equips,buffs,mastery){
  const es=getEquipStats(equips);const bb=getBuffBonuses(buffs);const mb=mastery||{};
  let cr=calcCritR(equips,buffs,mastery);let cd=150+es.critD+(bb.critD||0)+(mb.critD||0);
  if(cr>100)cd+=Math.floor((cr-100)*2);return cd;
}
function calcCP(equips,martial){let cp=0;equips.forEach(e=>e&&(cp+=e.cp*(1+e.level*0.05)));if(martial)cp+=martial.cp;return Math.round(cp)}

// v6.5.3: Universal EffPower formula — HP scale buffed (0.12→0.20) to fix Heaven Canon DMG loss
const SCALE_MULT={atk:1.0,spd:1.15,def:1.6,hp:0.20,atk_elem:1.05};
function calcMoveDmg(equips,stage,move,school,tElem,pElem,maxHp,cl=1,buffs,mastery){
  const atk=calcAtk(equips,stage,cl,buffs,mastery);const spd=calcSpd(equips,buffs,mastery);const def=calcDef(equips,cl,buffs,mastery);
  const ss=school?.scaleStat||"atk";const sm=SCALE_MULT[ss]||1.0;let base;
  if(ss==="spd")base=Math.floor(spd*move.power*sm);
  else if(ss==="def")base=Math.floor((def*sm+atk*0.3)*move.power);
  else if(ss==="hp"){const convRate=Math.min(1.0,1.0-Math.max(0,(maxHp-1000)/6000)*0.25);base=Math.floor(maxHp*move.power*sm*convRate)}
  else if(ss==="atk_elem"){const em=elemMult(pElem,tElem);base=Math.floor(atk*move.power*Math.max(em*sm,1.05))}
  else base=Math.floor(atk*move.power*sm);
  const critR=Math.min(calcCritR(equips,buffs,mastery),100);const critD=calcCritD(equips,buffs,mastery);
  let effCritR=critR;if(isCountered(pElem,tElem))effCritR=Math.max(0,effCritR-20);
  const isCrit=Math.random()*100<effCritR;if(isCrit)base=Math.floor(base*critD/100);
  const em2=elemMult(pElem,tElem);base=Math.floor(base*em2);
  return{dmg:Math.max(1,base+rng(-2,3)),isCrit};
}

// v6.4.4.2: Deterministic CR init based on SPD ratio, no more random
function initCR(pSpd,enemies){
  // Each unit starts with CR proportional to their SPD
  const maxSpd=Math.max(pSpd,...enemies.map(e=>e.spd||50));
  const pCR=Math.floor((pSpd/maxSpd)*60);
  return{pCR,enemies:enemies.map(e=>({...e,cr:Math.floor((e.spd/maxSpd)*60)}))}}
// v6.4.4.2: Apply wave SPD variance (100-105% of base SPD, fixed per wave)
function applyWaveSpdVariance(entities,pSpd){
  const pVar=1.0+Math.random()*0.05; // 100-105%
  const adjustedPSpd=Math.floor(pSpd*pVar);
  const adjusted=entities.map(e=>({...e,spd:Math.floor(e.spd*(1.0+Math.random()*0.05))}));
  return{adjustedPSpd,enemies:adjusted};
}
function findNextTurn(pCR,pSpd,enemies){
  const pN=(100-pCR)/crFillRate(pSpd);let minT=pN,who="player",eidx=-1;
  enemies.forEach((e,i)=>{if(e.hp<=0||e.stunned)return;
    const effSpd=e.spdDown?Math.floor(e.spd*0.8):e.spd;
    const n=(100-e.cr)/crFillRate(effSpd);if(n<minT){minT=n;who="enemy";eidx=i}});
  return{ticks:minT,who,eidx};
}
function advanceCR(pCR,pSpd,enemies,ticks){
  return{pCR:Math.min(100,pCR+crFillRate(pSpd)*ticks),
    enemies:enemies.map(e=>{if(e.hp<=0)return e;const effSpd=e.spdDown?Math.floor(e.spd*0.8):e.spd;
      return{...e,cr:Math.min(100,e.cr+crFillRate(effSpd)*ticks)}})};
}
function resolveEnemyPhase(state){
  let{pCR,enemies,hp,equips,defBuff,defBuffAmt,log,dodge,reflectActive,martial,elem,buffs,mastery,shield}=state;
  const cl=state.cl||1;const pSpd=calcSpd(equips,buffs,mastery);const{bonuses}=getSetBonuses(equips);
  const dmgReduce=(bonuses.dmgReduce||0)/100;
  let defLeft=defBuff||0,defAmt=defBuffAmt||0,dg=dodge||false,ref=reflectActive||false;
  let pShield=shield||0;
  let guard=200;
  while(guard-->0){
    if(pCR>=100)break;const alive=enemies.filter(e=>e.hp>0&&!e.stunned);if(alive.length===0)break;
    const{ticks,who,eidx}=findNextTurn(pCR,pSpd,enemies);
    const adv=advanceCR(pCR,pSpd,enemies,ticks);pCR=adv.pCR;enemies=adv.enemies;
    if(who==="player"||pCR>=100)break;
    const e=enemies[eidx];if(!e||e.hp<=0)continue;
    let ne={...e,cr:0,stunned:false};
    if(ne.spdDown)ne.spdDown=Math.max(0,ne.spdDown-1);
    // v6.4.4.2: DEF break countdown
    if(ne.defBreakTurns>0)ne.defBreakTurns=Math.max(0,ne.defBreakTurns-1);
    if(ne.dotTurns>0){const dd=ne.dotDmg;ne={...ne,hp:Math.max(0,ne.hp-dd),dotTurns:ne.dotTurns-1};
      log=[...log.slice(-60),{id:uid(),msg:`🔥 ${e.name} burns ${dd}`,cls:"dot"}]}
    if(ne.hp>0&&ne.isBoss&&!ne.enraged&&ne.hp/ne.maxHp<0.30){
      ne={...ne,enraged:true,atk:Math.floor(ne.atk*1.5)};
      log=[...log.slice(-60),{id:uid(),msg:`🔥 ${ne.name} ENRAGED!`,cls:"boss"}];SFX.enrage()}
    if(ne.hp>0){
      const skills=ne.skills||[{name:"Attack",cd:0,mult:1.0,aoe:false}];
      const cds=ne.skillCds||skills.map(()=>0);
      // v6.4.4.2: Smarter monster AI — prioritize AoE when multiple players, heal when low
      let si=0;
      const hpPct=ne.hp/ne.maxHp;
      for(let j=skills.length-1;j>=0;j--){
        if(cds[j]>0)continue;
        const sk2=skills[j];
        if(sk2.heal&&hpPct<0.4){si=j;break}
        if(sk2.aoe){si=j;break}
        if(sk2.mult>1.2){si=j;break}
        if(cds[j]<=0)si=j;
      }
      const sk=skills[si];const newCds=cds.map((c,j)=>j===si?(sk.cd||0):Math.max(0,c-1));
      if(sk.buff==="def_up"){ne.defBuff=(ne.defBuff||0)+3;ne.skillCds=newCds;
        log=[...log.slice(-60),{id:uid(),msg:`🛡 ${ne.name} uses ${sk.name}!`,cls:"boss"}];
        enemies=enemies.map((en,j)=>j===eidx?ne:en);if(pCR>=100)break;continue}
      if(sk.heal){const ha=Math.floor(ne.maxHp*(sk.heal/100));ne.skillCds=newCds;
        enemies=enemies.map((en,j)=>j===eidx?ne:en);
        enemies.filter(x=>x.hp>0).forEach(x=>{x.hp=Math.min(x.maxHp,x.hp+ha)});
        log=[...log.slice(-60),{id:uid(),msg:`💚 ${ne.name} heals ${ha}HP!`,cls:"boss"}];if(pCR>=100)break;continue}
      if(sk.buff==="atk_up"&&ne.isBoss){ne={...ne,atk:Math.floor(ne.atk*1.3)};
        log=[...log.slice(-60),{id:uid(),msg:`⚔️ ${ne.name.slice(0,6)} ATK Up!`,cls:"boss"}];
        enemies=enemies.map((en,j)=>j===eidx?{...ne,skillCds:newCds}:en);if(pCR>=100)break;continue}
      if(sk.buff==="cr_push"&&ne.isBoss){ne={...ne,cr:Math.min(100,ne.cr+20)};
        enemies=enemies.map((en,j)=>j===eidx?{...ne,skillCds:newCds}:en);if(pCR>=100)break;continue}
      // v6.4.4.2: Improved DEF formula — DEF% and RES% are stronger
      const baseDef=calcDef(equips,cl,buffs,mastery);
      const totalDef=baseDef+(defLeft>0?defAmt:0);
      let rawA=Math.floor(ne.atk*(sk.mult||1.0));if(ne.enraged)rawA=Math.floor(rawA*1.1);
      const raw=Math.max(1,rawA+rng(-2,3));
      // v6.4.4.2: DEF now reduces more — 0.45 factor (was 0.35)
      const dmg=Math.max(1,Math.floor((raw-Math.floor(totalDef*0.45))*(1-dmgReduce)));
      if(dg){log=[...log.slice(-60),{id:uid(),msg:"💨 Dodged!",cls:"skill"}];dg=false}
      else{
        let fd=dmg;
        if(ref){const r=Math.floor(dmg*.28);ne={...ne,hp:Math.max(0,ne.hp-r)};fd=Math.max(0,dmg-r);ref=false;
          log=[...log.slice(-60),{id:uid(),msg:`🔄 Reflect ${r}`,cls:"skill"}]}
        if(bonuses.reflect>0){const rr=Math.floor(dmg*bonuses.reflect/100);ne={...ne,hp:Math.max(0,ne.hp-rr)}}
        // v6.4.4.2: Shield absorbs damage first
        if(pShield>0){const absorbed=Math.min(pShield,fd);pShield-=absorbed;fd-=absorbed;
          if(absorbed>0)log=[...log.slice(-60),{id:uid(),msg:`🔷 Shield -${absorbed}`,cls:"skill"}]}
        hp=Math.max(0,hp-fd);defLeft=Math.max(0,defLeft-1);
        const skName=sk.name||"Attack";
        if(fd>0)log=[...log.slice(-60),{id:uid(),msg:`${e.name.slice(0,7)} [${skName}]: ${fd}`,cls:"boss"}];
        if(sk.eff&&Math.random()*100<(sk.effC||0)){
          if(sk.eff==="stun")log=[...log.slice(-60),{id:uid(),msg:`💫 Stunned by ${skName}!`,cls:"boss"}];
          if(sk.eff==="spd_down")log=[...log.slice(-60),{id:uid(),msg:`🐌 SPD Down from ${skName}!`,cls:"boss"}]}

// v6.5.3: Monster SPD soft cap (replaces hard cap)
function softCapSpd(raw){if(raw<=150)return raw;return Math.floor(150+(raw-150)*0.4)}
function makeEnemy(stage,wave,isBoss,defIdx=0,mode="normal"){
  // v6.4.4.2: Endless mode softer scaling after stage 20
  const em=mode==="endless"?(stage<=20?1+stage*.15:1+20*.15+(stage-20)*.08):1.0+stage*0.05;
  const ss=1+Math.max(0,stage-3)*0.06;
  const def=isBoss?BOSS_DEFS[Math.min(defIdx,9)]:MINION_DEFS[Math.floor(Math.random()*MINION_DEFS.length)];
  const hpB=isBoss?(100+stage*30+wave*8):(42+stage*14+wave*4);
  const atkB=isBoss?(9+stage*4.5+wave*1.3):(5+stage*3.2+wave*.9);
  // v6.4.4.2: Base SPD per monster type, gradual scale with diminishing returns
  const baseSpdRaw=isBoss?(62+stage*5.5+wave*1.2):(50+stage*3.8+wave*0.6);
  const rawSpd=Math.floor(baseSpdRaw*def.spdM);
  // Diminishing returns: soft cap at 160, hard limit at 220
  const spdB=rawSpd<=160?rawSpd:Math.floor(160+(rawSpd-160)*0.35);
  const finalSpd=Math.min(220,spdB);
  return{id:uid(),isBoss,defId:def.id,name:def.name,color:def.color,
    elemId:BOSS_ELEMS[Math.min(isBoss?defIdx:Math.floor(Math.random()*5),9)],
    hp:Math.round(hpB*def.hpM*em*ss),maxHp:Math.round(hpB*def.hpM*em*ss),
    atk:Math.round(atkB*def.atkM*em*ss),spd:finalSpd,
    def:Math.round((isBoss?(2+stage*2.5):(1+stage*1.4))*em),
    skills:def.skills||[{name:"Attack",cd:0,mult:1.0,aoe:false}],
    skillCds:(def.skills||[{cd:0}]).map(()=>0),
    cr:0,dotTurns:0,dotDmg:0,stunned:false,enraged:false,spdDown:0,
    // v6.4.4.2: Shield support for enemies
    shield:0,maxShield:0,defBreakTurns:0};
}
function stageWaves(mode,stage){
  // v6.5.3: Hunt = fixed single stage, always 3 waves (2 minion/elite + 1 boss)
  if(mode?.startsWith?.("hunt_"))return 3;
  // v6.4.4.2: Endless mode — cap waves at 8 after stage 20, gradual difficulty
  if(mode==="endless"){
    if(stage<=20)return Math.min(6+Math.floor(stage/2),10);
    return Math.min(8+Math.floor((stage-20)/5),10); // slower wave increase after 20
  }
  return Math.min(4+Math.floor((stage-1)/2),7);
}
function makeWave(stage,wave,tw,mode){
  if(wave===tw)return[makeEnemy(stage,wave,true,stage-1,mode)];
  const base=stage<=2?2:stage<=5?rng(2,3):rng(2,4);
  const enemies=Array.from({length:base},()=>makeEnemy(stage,wave,false,0,mode));
  // v6.4.4.2: Elite always spawns with minions from stage 4+, 40% chance (was 25%)
  if(stage>3&&Math.random()<0.40){
    const ed=ELITE_DEFS[Math.floor(Math.random()*ELITE_DEFS.length)];
    const em=mode==="endless"?1+stage*.15:1.0+stage*0.05;const ss=1+Math.max(0,stage-3)*0.06;
    const hpB=70+stage*22+wave*6;const atkB=7+stage*4+wave*1.1;
    const baseSpdRaw=55+stage*4.2;const rawSpd=Math.floor(baseSpdRaw*ed.spdM);
    const spdB=rawSpd<=160?rawSpd:Math.floor(160+(rawSpd-160)*0.35);
    enemies.push({id:uid(),isBoss:false,isElite:true,defId:ed.id,name:ed.name,color:ed.color,
      elemId:BOSS_ELEMS[Math.floor(Math.random()*5)],
      hp:Math.round(hpB*ed.hpM*em*ss),maxHp:Math.round(hpB*ed.hpM*em*ss),
      atk:Math.round(atkB*ed.atkM*em*ss),spd:Math.min(220,spdB),
      def:Math.round((1.5+stage*2)*em),skills:ed.skills,skillCds:ed.skills.map(()=>0),
      cr:0,dotTurns:0,dotDmg:0,stunned:false,enraged:false,spdDown:0,
      shield:0,maxShield:0,defBreakTurns:0});
  }
  return enemies;
}

function fuseSchools(a,b){
  // v6.4.4.2: New T2 Fusion — each art can only fuse once → T2
  if(!a||!b)return{success:false,log:"Need 2 arts"};
  if((a.fusionCount||0)>=MAX_FUSION)return{success:false,log:`${a.name} already T2 (max fusion)`};
  if((b.fusionCount||0)>=MAX_FUSION)return{success:false,log:`${b.name} already T2`};
  // Find school indices
  const idxA=MARTIAL_SCHOOLS.findIndex(s=>s.id===a.schoolId);
  const idxB=MARTIAL_SCHOOLS.findIndex(s=>s.id===b.schoolId);
  if(idxA<0||idxB<0)return{success:false,log:"Unknown school"};
  // 8% failure chance
  if(Math.random()<0.08)return{success:false,log:"⚗️ Fusion failed! Both arts consumed."};
  // Get T2 skill candidates
  const t2pool=getT2Skills(idxA,idxB);
  if(!t2pool||t2pool.length===0)return{success:false,log:"No T2 skills found"};
  // Determine how many new skills (probability: 1 new=55%, 2 new=35%, 3 new=10%)
  const roll=Math.random();
  const newCount=roll<0.10?3:roll<0.45?2:1;
  // Group T2 by slot
  const bySlot=[[],[],[]];
  t2pool.forEach(sk=>{const s=sk.parentA.slot;if(s>=0&&s<3)bySlot[s].push(sk)});
  // Pick which slots get new skills
  const slots=shuffle([0,1,2]).slice(0,newCount);
  // Build result moves: keep originals, replace selected slots with T2
  const srcA=a.baseMoves||a.moves;const srcB=b.baseMoves||b.moves;
  const resultMoves=srcA.map((m,i)=>{
    if(slots.includes(i)&&bySlot[i].length>0){
      const pick=bySlot[i][Math.floor(Math.random()*bySlot[i].length)];
      return{...pick,currentCd:0,skillLv:0,cd:i===0?0:pick.cd,id:uid()};
    }
    return{...m,currentCd:0,skillLv:0,id:uid()};
  });
  const maxRar=RARITIES[Math.min(RARITIES.indexOf(a.rarity),RARITIES.indexOf(b.rarity))];
  const nameA=SCHOOL_MAP[a.schoolId]?.name?.split(' ')[0]||a.name.slice(0,5);
  const nameB=SCHOOL_MAP[b.schoolId]?.name?.split(' ')[0]||b.name.slice(0,5);
  const t2Name=a.schoolId===b.schoolId?`${nameA} Mastery`:`${nameA}·${nameB}`;
  const result={...a,id:uid(),name:t2Name,fusionCount:1,rarity:maxRar,tier:2,
    schoolIdA:a.schoolId,schoolIdB:b.schoolId,
    moves:resultMoves,baseMoves:resultMoves.map(m=>({...m})),
    level:0,cp:Math.round((R_CP[maxRar]||1)*6),
    color:SCHOOL_MAP[b.schoolId]?.color||a.color};
  // T2 branches
  result._t2Branches=T2_SKILL_LIB._branches(result);
  const flog=`✦ T2 FUSION! ${newCount} new skill${newCount>1?"s":""}: ${slots.map(s=>"S"+(s+1)).join("+")}`;
  SFX.fuse();return{success:true,result,log:flog};
}

function applyExp(s,gain){
  if(s.cl>=MAX_CHAR_LV)return s;let exp=s.exp+gain,cl=s.cl,log=[...s.log],maxHp=s.maxHp,hp=s.hp;

    log=[...log.slice(-60),{id:uid(),msg:`✦ Lv.${cl} — ${REALMS[REALM_RANK(cl)]}`,cls:"merge"}];SFX.levelUp();

}

function executeSkill(s,mi){
  const mart=s.martial;const move=mart?mart.moves[mi]:DEFAULT_S1;
  if(!move||(move.currentCd||0)>0)return s;
  const{equips,maxHp,targetIdx,elem,buffs,mastery}=s;const cl=s.cl||1;const pElem=elem?.id;

    log=[...log.slice(-60),{id:uid(),msg:`💚 ${move.name} heals ${healAmt}HP`,cls:"skill"}]}

    if((ne.shield||0)>0){const ab=Math.min(ne.shield,d);ne={...ne,shield:ne.shield-ab};d-=ab}
    // v6.4.4.2: DEF break — enemy takes 50% more if DEF broken

    ne={...ne,hp:Math.max(0,ne.hp-d)};return ne};
  if(move.aoe){
    let tot=0;enemies=enemies.map(e=>{if(e.hp<=0)return e;let{dmg:d,isCrit}=getDmg(e.elemId);d=Math.floor(d*0.7);
      let ne=hitEnemy({...e},d);tot+=d;
      if(move.eff&&move.effChance){const effR=calcEffRes(equips,buffs,mastery);const chance=(move.effChance+(move.bonusEff||0)+eff-effR);
        if(Math.random()*100<chance){
          if(move.eff==="stun")ne={...ne,stunned:true};
          if(move.eff==="burn"||move.eff==="poison")ne={...ne,dotTurns:(ne.dotTurns||0)+3,dotDmg:Math.max(ne.dotDmg||0,Math.floor(d*.18))};
          if(move.eff==="spd_down")ne={...ne,spdDown:2};
          if(move.eff==="cr_delay")ne={...ne,cr:Math.max(0,ne.cr-25)};
        }}
      // v6.4.4.2: DEF break from Dragon set
      if(bonuses.defBreak>0)ne={...ne,defBreakTurns:Math.max(ne.defBreakTurns||0,bonuses.defBreak)};
      return ne});
    log=[...log.slice(-60),{id:uid(),msg:`⊕ ${move.name} ALL ~${Math.floor(tot/(enemies.filter(e=>e.hp>0).length||1))}`,cls:"aoe"}];
    if(type.includes("drain")||type.includes("true_drain")){const h=Math.floor(tot*.12);hp=Math.min(maxHp,hp+h);log=[...log.slice(-60),{id:uid(),msg:`💚 Drain +${h}`,cls:"skill"}]}
    SFX.skill();
  }else{
    const tgt=enemies[targetIdx];if(!tgt||tgt.hp<=0)return s;
    if(type==="sacrifice"){const totalPool=hp+(pShield||0);const cost=Math.floor(maxHp*0.20);if(pShield>0){const shieldCost=Math.min(pShield,Math.floor(cost*0.5));pShield-=shieldCost;hp=Math.max(1,hp-(cost-shieldCost))}else{hp=Math.max(1,hp-cost)};log=[...log.slice(-60),{id:uid(),msg:`🩸 Sacrifice -${cost} HP`,cls:"boss"}]}
    const{dmg:d,isCrit}=getDmg(tgt.elemId);let ne=hitEnemy({...tgt},d);
    const eM=elemMult(pElem,tgt.elemId);const eSym=eM>1?"▲":eM<1?"▼":"";
    const critTag=isCrit?" CRIT!":"";
    log=[...log.slice(-60),{id:uid(),msg:`${move.icon} ${move.name}: ${d}${eSym}${critTag}`,cls:"skill"}];
    if(type.includes("burn")||type.includes("poison"))ne={...ne,dotTurns:4,dotDmg:Math.max(1,Math.floor(d*.18))};
    if(move.eff==="stun"&&move.effChance&&Math.random()*100<(move.effChance+(move.bonusEff||0)+eff)){ne={...ne,stunned:true};log=[...log.slice(-60),{id:uid(),msg:"💫 Stunned",cls:"skill"}]}
    if(type.includes("drain")){const h=Math.floor(d*(move.drainPct||18)/100);const overflow=Math.max(0,(hp+h)-maxHp);hp=Math.min(maxHp,hp+h);if(overflow>0)pShield=Math.min(maxHp,pShield+Math.floor(overflow*0.5));log=[...log.slice(-60),{id:uid(),msg:`💚 +${h}`,cls:"skill"}]}
    if(type==="buff_def"){defBuff=3;defBuffAmt=Math.floor(calcDef(equips,cl,buffs,mastery)*1.6)}

      const shAmt=Math.floor(maxHp*0.20);pShield=Math.min(maxHp,pShield+shAmt);

    else if(type==="buff_reflect"){defBuff=3;reflectActive=true;defBuffAmt=Math.floor(calcDef(equips,cl,buffs,mastery)*1.2)}
    if(type==="dodge_pierce"){dodge=true;log=[...log.slice(-60),{id:uid(),msg:"💨 Dodge ready",cls:"skill"}]}
    // v6.4.4.2: DEF break from Dragon set on single target

    enemies=enemies.map((e,i)=>i===targetIdx?ne:e);

      ns.log=[...ns.log.slice(-60),{id:uid(),msg:`⚔️ Dual: ${Math.floor(d2*0.7)}${ic2?" CRIT!":""}`,cls:"skill"}];
      ns=checkCleared(ns);if(ns.phase==="loot")return ns;
    }}

    ns={...ns,pCR:100};ns.log=[...ns.log.slice(-60),{id:uid(),msg:"⚡ Extra Turn!",cls:"merge"}]}
  return ns;
}

function genLoot(s){
  // v6.5.3: Hunt mode — only drop on final wave (boss), only equipment from group + rare stones
  const isHunt=s.mode?.startsWith?.("hunt_");
  const boss=s.wave===s.tw;
  if(isHunt&&!boss){
    // Non-boss hunt waves: NO drops at all, only gold/exp
    const modeInfo=MODES[s.mode]||MODES.normal;
    const gold=Math.floor((rng(2,5))*(modeInfo.goldMult||1));
    const expGain=Math.floor((rng(5,12))*(modeInfo.expMult||1));
    const masteryGain=Math.floor(4+1*3);
    return{loots:[],gold,expGain,masteryGain};
  }
  if(isHunt&&boss){
    // Boss wave: use makeHuntLoot — equipment from group + very rare stones only
    const modeInfo=MODES[s.mode]||MODES.normal;
    const huntIdx=modeInfo.huntIdx||0;
    const diffIdx=s.huntDiff||0;
    const huntGroup=HUNT_GROUPS[huntIdx];
    const loots=huntGroup?makeHuntLoot(huntGroup,diffIdx,s.stage):[];
    const gold=Math.floor((rng(8,18))*(modeInfo.goldMult||1));
    const expGain=Math.floor((rng(15,35))*(modeInfo.expMult||1));
    const masteryGain=Math.floor(8+s.stage*3);
    return{loots,gold,expGain,masteryGain};
  }
  // Normal / Endless loot (unchanged)
  const loots=[];const itemCount=Math.random()<0.65?1:2;
  for(let i=0;i<itemCount;i++){
    const roll=Math.random()*100;
    if(roll<62)loots.push(makeEquip(s.stage,s.mode));
    else if(roll<84)loots.push(makeMartialItem(s.stage,s.mode));
    else if(roll<89)loots.push(makeEnhanceStone());
    else if(roll<94)loots.push(makeReforgeStone());
    else loots.push(makeSkillBook(rng(1,3)));
  }
  if(boss){loots.push(makeBreakthroughPill(s.stage));
    if(Math.random()<0.08)loots.push(makeResetPill());
  }
  const modeInfo=MODES[s.mode]||MODES.normal;
  const gold=Math.floor((rng(3,8)+s.stage*2)*(modeInfo.goldMult||1));
  const expGain=Math.floor((rng(10,25)+s.stage*8)*(modeInfo.expMult||1));
  const masteryGain=Math.floor(8+s.stage*3);
  return{loots,gold,expGain,masteryGain};
}
function waveCleared(s){

      {isEquipTab&&<select value={filterStat} onChange={e=>setFilterStat(e.target.value)} style={{background:"rgba(0,0,0,.4)",border:"1px solid rgba(255,255,255,.08)",color:C.muted,borderRadius:3,fontSize:9,padding:"1px 2px",marginLeft:2,maxWidth:70}}>

      <div style={{flex:1}}/>

          onMouseLeave={()=>{tip.hide();setHoverEquip?.(null)}}
          onClick={()=>{if(locked)return;if(pick)return onPickMerge(idx);const it=run.inventory[idx];if(it&&it.type==="equip"){setSelInvIdx(selInvIdx===idx?-1:idx)}else{setSelInvIdx(-1);onEquip(idx)}}}

          <div style={{fontSize:22,position:"relative"}}>{item.type==="martial"?(item.moves?.[0]?.icon||"📜"):(item.icon||SLOT_ICON[item.slot]||"?")}

        {selInvIdx>=0&&run.inventory[selInvIdx]&&(()=>{const si=selInvIdx;const it=run.inventory[si];

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{fontSize:28}}>{it.icon||"?"}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:isEq?R_COLOR[it.rarity]:C.gold,fontWeight:700}}>{it.displayName||it.name} {isEq&&<span className="gear-score">GS:{calcGearScore(it)}</span>}{it.enhanced&&<span style={{fontSize:9,color:"#cc88ff",marginLeft:4}}>✦</span>}</div>
            <div style={{display:"flex",gap:4,alignItems:"center"}}>

</div>)}

      ];
      // Check which edges to highlight
      const selIdx=elem?nodes.findIndex(n=>n.e.id===elem):-1;
      const selElem=selIdx>=0?nodes[selIdx].e:null;
      return(<div style={{position:"relative",width:S,height:S,margin:"0 auto 10px"}}>
        {/* Outer ring */}
        <div style={{position:"absolute",inset:20,borderRadius:"50%",border:"1px solid rgba(220,180,80,.08)"}}/>
        {/* SVG arrows */}
        <svg viewBox={`0 0 ${S} ${S}`} style={{position:"absolute",inset:0,pointerEvents:"none"}}>
          <defs>
            {counterEdges.map((edge,i)=><marker key={`ah${i}`} id={`ah${i}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill={
                selElem?(selElem.counters===nodes[edge.to].e.id||selElem.id===nodes[edge.from].e.id&&selElem.counters===nodes[edge.to].e.id)?edge.color:
                (selElem.weakTo===nodes[edge.from].e.id&&selElem.id===nodes[edge.to].e.id)?"#ff4444":"rgba(255,255,255,.1)":"rgba(255,255,255,.1)"
              } opacity={selElem?(selElem.counters===nodes[edge.to].e.id&&selElem.id===nodes[edge.from].e.id?"1":selElem.weakTo===nodes[edge.from].e.id&&selElem.id===nodes[edge.to].e.id?"0.8":"0.15"):"0.2"}/>
            </marker>)}
          </defs>
          {counterEdges.map((edge,i)=>{
            const f=nodes[edge.from];const t=nodes[edge.to];
            // Shorten line to not overlap node circles
            const dx=t.x-f.x;const dy=t.y-f.y;const len=Math.sqrt(dx*dx+dy*dy);
            const ux=dx/len;const uy=dy/len;
            const x1=f.x+ux*34;const y1=f.y+uy*34;const x2=t.x-ux*34;const y2=t.y-uy*34;
            const isActive=selElem&&selElem.id===nodes[edge.from].e.id&&selElem.counters===nodes[edge.to].e.id;
            const isWeak=selElem&&selElem.id===nodes[edge.to].e.id&&selElem.weakTo===nodes[edge.from].e.id;
            return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={isActive?edge.color:isWeak?"#ff4444":"rgba(255,255,255,.08)"}
              strokeWidth={isActive?"3":isWeak?"2.5":"1"}
              strokeDasharray={isActive||isWeak?undefined:"6,4"}
              markerEnd={`url(#ah${i})`}
              opacity={isActive?"0.9":isWeak?"0.7":"0.2"}
              style={{transition:"all .3s"}}/>;
          })}
        </svg>
        {/* Element nodes */}
        {nodes.map(({e,x,y})=>{
          const sel=elem===e.id;const isCountered=selElem?.counters===e.id;const isCounter=selElem?.weakTo===e.id;
          return(<div key={e.id} onClick={()=>setElem(e.id)}
            style={{position:"absolute",left:x-32,top:y-32,width:64,height:64,borderRadius:"50%",cursor:"pointer",
              background:`radial-gradient(circle,${e.color}${sel?"55":isCountered?"33":"11"},transparent 70%)`,
              border:`2.5px solid ${e.color}${sel?"cc":isCountered?"88":isCounter?"66":"33"}`,
              boxShadow:sel?`0 0 24px ${e.color}66,inset 0 0 12px ${e.color}22`:isCountered?`0 0 12px ${e.color}33`:"none",
              display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
              transform:sel?"scale(1.18)":isCountered||isCounter?"scale(1.06)":"scale(1)",
              transition:"all .25s ease-out",zIndex:sel?5:isCountered?3:1}}>
            <div style={{fontSize:24,lineHeight:1}}>{e.icon}</div>
            <div style={{fontSize:10,color:e.color,fontWeight:700,marginTop:1}}>{e.name}</div>
          </div>)
        })}
        {/* Center */}
        <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center",pointerEvents:"none"}}>
          <div style={{fontSize:11,color:"rgba(220,180,80,.4)",letterSpacing:3,fontWeight:600}}>WUXING</div>
        </div>
        {/* Counter label */}
        {selElem&&<div style={{position:"absolute",bottom:-2,left:"50%",transform:"translateX(-50%)",textAlign:"center",pointerEvents:"none"}}>
          <span style={{fontSize:9,color:selElem.color}}>▶ Counters: {ELEM_MAP[selElem.counters]?.icon} {ELEM_MAP[selElem.counters]?.name}</span>
          <span style={{fontSize:9,color:"#ff6666",marginLeft:8}}>▶ Weak to: {ELEM_MAP[selElem.weakTo]?.icon} {ELEM_MAP[selElem.weakTo]?.name}</span>
        </div>}
      </div>)})()}
    {elem&&<div style={{background:"rgba(0,0,0,.15)",borderRadius:6,padding:"6px 10px",marginBottom:8,border:`1px solid ${ELEM_MAP[elem]?.color}22`,textAlign:"left"}}>
      <div style={{fontSize:13,color:C.muted,lineHeight:1.5}}>{ELEM_MAP[elem]?.desc}</div>
      <div style={{fontSize:11,color:"#5a6a8a",marginTop:3}}>Advantage: +28% DMG, Disadvantage: -20% CRT -20% DMG</div>
    </div>}
    <button onClick={()=>elem&&setStep(2)} disabled={!elem} className="btn" style={{width:"100%",background:elem?"linear-gradient(135deg,#8a6820,#dcb450)":"rgba(255,255,255,.03)",color:elem?"#16182a":"#2a2a3a",border:"none",borderRadius:6,padding:"9px",fontSize:20,fontWeight:700}}>Next →</button>
  </div></div>)}

// ═══ PVP ARENA MODAL ═══
function PvPArenaModal({onClose,currentPlayer}){
  const[p1,setP1]=useState(null);const[p2,setP2]=useState(null);
  const[result,setResult]=useState(null);const[fighting,setFighting]=useState(false);
  const[showLog,setShowLog]=useState(false);
  // v6.4.4.3: Skill priority — drag order for each player's skills
  const[prio1,setPrio1]=useState([2,1,0]); // default: S3>S2>S1
  const[prio2,setPrio2]=useState([2,1,0]);
  const importProfile=(slot)=>{
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
      r.onload=ev=>{try{const p=JSON.parse(ev.target.result);
        if(!p.equips){alert("Invalid PvP profile — needs equips data");return}
        if(!Array.isArray(p.equips))p.equips=Array(6).fill(null);
        if(!p.martial)p.martial=null;
        if(slot===1){setP1(p);setPrio1([2,1,0])}else{setP2(p);setPrio2([2,1,0])}
        setResult(null);
      }catch(err){alert("Parse error: "+err.message)}};r.readAsText(f)};
    inp.click();
  };
  const useCurrentPlayer=(slot)=>{
    if(!currentPlayer)return;
    // v6.4.4.3: Only copy equips + martial — no mastery, element, level, buffs
    const profile={_pvp:true,
      equips:(currentPlayer.equips||[]).map(e=>e?{...e}:null),
      martial:currentPlayer.martial?{...currentPlayer.martial,moves:(currentPlayer.martial.moves||[]).map(m=>({...m}))}:null};
    if(slot===1){setP1(profile);setPrio1([2,1,0])}else{setP2(profile);setPrio2([2,1,0])}
    setResult(null);
  };
  const doFight=()=>{if(!p1||!p2)return;setFighting(true);setResult(null);
    setTimeout(()=>{const r=runPvPCombat(p1,p2,prio1,prio2);setResult(r);setFighting(false)},300)};
  // Skill priority editor
  const renderPriority=(prio,setPrio,moves,label,color)=>{
    if(!moves||moves.length===0)return null;
    const moveUp=(idx)=>{if(idx<=0)return;const np=[...prio];[np[idx-1],np[idx]]=[np[idx],np[idx-1]];setPrio(np)};
    const moveDown=(idx)=>{if(idx>=prio.length-1)return;const np=[...prio];[np[idx+1],np[idx]]=[np[idx],np[idx+1]];setPrio(np)};
    return(<div style={{marginTop:4}}>
      <div style={{fontSize:9,color,fontWeight:600,marginBottom:2}}>Skill Priority ({label})</div>
      <div style={{display:"flex",flexDirection:"column",gap:1}}>
        {prio.map((si,rank)=>{const m=moves[si];if(!m)return null;
          return(<div key={rank} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 4px",background:"rgba(0,0,0,.15)",borderRadius:3,fontSize:10}}>
            <span style={{color:C.gold,fontWeight:700,width:14}}>{rank+1}.</span>
            <span>{m.icon||"⚔"}</span>
            <span style={{color:"#aaa",flex:1}}>{m.name} <span style={{color:"#666"}}>×{(m.power||0).toFixed(1)} CD:{m.cd||0}</span></span>
            <button onClick={()=>moveUp(rank)} disabled={rank===0} style={{fontSize:9,cursor:"pointer",background:"none",border:"none",color:rank>0?"#88aacc":"#333",padding:"0 2px"}}>▲</button>
            <button onClick={()=>moveDown(rank)} disabled={rank>=prio.length-1} style={{fontSize:9,cursor:"pointer",background:"none",border:"none",color:rank<prio.length-1?"#88aacc":"#333",padding:"0 2px"}}>▼</button>
          </div>)})}
      </div>
    </div>);
  };
  // Profile card — balanced display (no element/level/mastery)
  const renderProfile=(p,label,color,prio,setPrio)=>{
    if(!p)return(<div style={{flex:1,minWidth:200,padding:12,background:"rgba(0,0,0,.2)",borderRadius:8,border:"1px dashed rgba(255,255,255,.1)",textAlign:"center",minHeight:180,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{color:"#3a3a4a",fontSize:14}}>Import {label}</div></div>);
    const s=calcPvPStats(p);const mart=p.martial;const{activeNames}=getSetBonuses(p.equips);
    return(<div style={{flex:1,minWidth:200,padding:10,background:"rgba(0,0,0,.2)",borderRadius:8,border:`1px solid ${color}44`}}>
      <div style={{fontSize:15,color,fontWeight:700,marginBottom:4,textAlign:"center"}}>{label}</div>
      <div style={{fontSize:10,color:C.muted,textAlign:"center",marginBottom:4}}>CP {s.cp} · Base {PVP_BASE.hp}HP {PVP_BASE.atk}ATK</div>
      {mart&&<div style={{padding:"4px 8px",background:"rgba(0,0,0,.15)",borderRadius:4,marginBottom:4}}>
        <div style={{fontSize:11,color:mart.color||"#aaa",fontWeight:600}}>{mart.moves?.[0]?.icon||"📜"} {mart.name} {mart.tier===2?"[T2]":"[T1]"}</div>
        <div style={{display:"flex",gap:2,marginTop:2}}>{(mart.moves||[]).map((m,i)=>
          <span key={i} style={{fontSize:9,color:"#8a8aaa",background:"rgba(255,255,255,.03)",borderRadius:2,padding:"1px 4px"}}>{m.icon} S{i+1} ×{(m.power||0).toFixed(1)}</span>)}</div>
      </div>}
      {activeNames.length>0&&<div style={{display:"flex",gap:2,flexWrap:"wrap",marginBottom:3}}>
        {activeNames.map((n,i)=><span key={i} style={{fontSize:8,color:"#88ccff",background:"rgba(100,180,255,.08)",borderRadius:2,padding:"1px 4px"}}>{n}</span>)}</div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:1,fontSize:10}}>
        {[{l:"HP",v:s.hp,c:"#44cc88"},{l:"ATK",v:s.atk,c:"#ff8844"},{l:"DEF",v:s.def,c:"#55aaff"},{l:"SPD",v:s.spd,c:"#ffcc44"},
          {l:"CRT",v:s.critR+"%",c:"#ff6688"},{l:"CDM",v:s.critD+"%",c:"#ff88aa"},{l:"EFF",v:s.eff+"%",c:"#ffaa88"},{l:"RES",v:s.effRes+"%",c:"#aaddff"}
        ].map(r=><div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"1px 4px"}}>
          <span style={{color:C.muted}}>{r.l}</span><span style={{color:r.c,fontWeight:600}}>{r.v}</span></div>)}
      </div>
      {mart&&renderPriority(prio,setPrio,mart.moves,label,color)}
    </div>);
  };
  return(<div style={OVL}><div className="fade-in" style={{...MOD,maxWidth:780,maxHeight:"94vh",overflow:"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{fontSize:22,color:"#ff6644",fontWeight:700}}>⚔ PvP Arena <span style={{fontSize:12,color:C.muted,fontWeight:400}}>Balanced Mode</span></div>
      <button onClick={onClose} className="btn" style={{fontSize:18,color:C.muted,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",padding:"2px 8px",borderRadius:6}}>✕</button>
    </div>
    <div style={{fontSize:11,color:"#5a6a8a",marginBottom:8,textAlign:"center",lineHeight:1.5}}>
      Equal base stats ({PVP_BASE.hp}HP / {PVP_BASE.atk}ATK / {PVP_BASE.def}DEF / {PVP_BASE.spd}SPD) · No element advantage · Only equipment & martial arts matter · Set skill priority before fighting
    </div>
    {/* Player cards */}
    <div style={{display:"flex",gap:10,marginBottom:10,alignItems:"stretch"}}>
      {renderProfile(p1,"Player 1","#4488ff",prio1,setPrio1)}
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,flexShrink:0}}>
        <div style={{fontSize:28,color:C.gold}}>⚔</div>
        <div style={{fontSize:9,color:C.muted}}>VS</div>
        <div style={{fontSize:8,color:"#555"}}>1x speed</div>
      </div>
      {renderProfile(p2,"Player 2","#ff6644",prio2,setPrio2)}
    </div>
    {/* Import buttons */}
    <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:8,flexWrap:"wrap"}}>
      <button onClick={()=>importProfile(1)} className="btn" style={{background:"rgba(68,136,255,.15)",border:"1px solid rgba(68,136,255,.3)",color:"#4488ff",padding:"4px 10px",borderRadius:5,fontSize:11}}>📥 Import P1</button>
      {currentPlayer&&<button onClick={()=>useCurrentPlayer(1)} className="btn" style={{background:"rgba(68,136,255,.08)",border:"1px solid rgba(68,136,255,.2)",color:"#6699cc",padding:"4px 10px",borderRadius:5,fontSize:10}}>🧙 Current → P1</button>}
      <button onClick={()=>importProfile(2)} className="btn" style={{background:"rgba(255,100,68,.15)",border:"1px solid rgba(255,100,68,.3)",color:"#ff6644",padding:"4px 10px",borderRadius:5,fontSize:11}}>📥 Import P2</button>
      {currentPlayer&&<button onClick={()=>useCurrentPlayer(2)} className="btn" style={{background:"rgba(255,100,68,.08)",border:"1px solid rgba(255,100,68,.2)",color:"#cc7766",padding:"4px 10px",borderRadius:5,fontSize:10}}>🧙 Current → P2</button>}
    </div>
    {/* Fight */}
    <div style={{textAlign:"center",marginBottom:8}}>
      <button onClick={doFight} disabled={!p1||!p2||fighting} className="btn"
        style={{background:p1&&p2?"linear-gradient(135deg,#8a2020,#cc4422)":"rgba(255,255,255,.03)",
          color:p1&&p2?"#ffddcc":"#333",border:"none",padding:"9px 28px",borderRadius:8,fontSize:18,fontWeight:700,
          boxShadow:p1&&p2?"0 4px 20px rgba(204,68,34,.3)":"none"}}>
        {fighting?"⏳ Fighting...":"⚔ FIGHT!"}</button>
    </div>
    {/* Result */}
    {result&&<div style={{textAlign:"center",marginBottom:8}}>
      <div style={{fontSize:32,marginBottom:3,animation:"goldPulse 1.5s infinite"}}>
        {result.winner===1?"🏆":"💀"} {result.winner===1?"🔵":"🔴"}</div>
      <div style={{fontSize:24,fontWeight:700,color:result.winner===1?"#4488ff":"#ff6644",marginBottom:3,
        textShadow:`0 0 20px ${result.winner===1?"rgba(68,136,255,.5)":"rgba(255,100,68,.5)"}`}}>
        Player {result.winner} Won!</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:5}}>
        {result.timeout?"⏱ Timeout — ":""}{result.turns} turns · P1: {result.hp1}/{result.s1.hp} HP · P2: {result.hp2}/{result.s2.hp} HP</div>
      <div style={{display:"flex",gap:4,justifyContent:"center"}}>
        <button onClick={()=>setShowLog(!showLog)} className="btn"
          style={{fontSize:10,color:showLog?"#88aacc":"#555",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",padding:"3px 10px",borderRadius:4}}>
          {showLog?"Hide":"Show"} Log ({result.log.length})</button>
        <button onClick={doFight} className="btn" style={{background:"rgba(220,180,80,.1)",border:"1px solid rgba(220,180,80,.2)",color:C.gold,padding:"3px 12px",borderRadius:4,fontSize:11}}>🔄 Rematch</button>
      </div>
      {showLog&&<div style={{marginTop:6,maxHeight:220,overflowY:"auto",textAlign:"left",padding:"6px 10px",background:"rgba(0,0,0,.2)",borderRadius:6,border:"1px solid rgba(255,255,255,.06)"}}>
        {result.log.map((l,i)=><div key={i} style={{fontSize:10,lineHeight:1.5,color:{sys:"#5a6a8a",boss:"#cc4422",skill:"#4488cc"}[l.cls]||C.muted}}>{l.msg}</div>)}
      </div>}
    </div>}
  </div></div>);
}

// v6.5.3: Universal Upgrade Dropbox — fixed panel for upgrade/enhance/reforge
function UniversalUpgradeBox({item,source,idx,run,onUpgrade,onEnhance,onReforge,onClose,locked}){
  const[reforgeSubIdx,setReforgeSubIdx]=useState(-1);
  if(!item||item.type!=="equip")return null;
  const cfg=RARITY_CONFIG[item.rarity];if(!cfg)return null;
  const canUp=!locked&&!item.locked&&item.level<(cfg.maxLv||15)&&(run.dustStore[item.slot]||0)>=DUST_COST[item.level+1];
  const vis=getVisibleSubCount(item);
  const mainMult=1+item.level*0.08;
  const setInfo=item.setId?SET_MAP[item.setId]:null;
  const is15=item.level>=15;

            style={{fontSize:16,color:"#88ccaa",background:themeMode==="light"?"rgba(0,0,0,.04)":"rgba(255,255,255,.03)",border:`1px solid ${themeMode==="light"?"rgba(0,0,0,.1)":"rgba(255,255,255,.07)"}`,padding:"5px 10px"}}>🗺</button>
          <button onClick={toggleTheme} className="btn" title={themeMode==="dark"?"Switch to Light Mode":"Switch to Dark Mode"}
            style={{fontSize:16,color:themeMode==="light"?"#8a6820":"#ffcc44",background:themeMode==="light"?"rgba(0,0,0,.04)":"rgba(255,255,255,.03)",border:`1px solid ${themeMode==="light"?"rgba(0,0,0,.1)":"rgba(255,255,255,.07)"}`,padding:"5px 10px"}}>{themeMode==="light"?"🌙":"☀️"}</button>
          <button onClick={()=>{SFX.setSfxMuted(sfxOn);setSfxOn(!sfxOn)}} className="btn"
            style={{fontSize:16,color:sfxOn?"#44cc88":"#555",background:themeMode==="light"?"rgba(0,0,0,.04)":"rgba(255,255,255,.03)",border:`1px solid ${themeMode==="light"?"rgba(0,0,0,.1)":"rgba(255,255,255,.07)"}`,padding:"5px 10px"}}>
            {sfxOn?"🔊":"🔇"}</button>
          <button onClick={onReturnMenu} className="btn"
            style={{fontSize:16,color:"#5a5a6a",background:themeMode==="light"?"rgba(0,0,0,.04)":"rgba(255,255,255,.03)",border:`1px solid ${themeMode==="light"?"rgba(0,0,0,.1)":"rgba(255,255,255,.07)"}`,padding:"5px 10px"}}>☰</button>
        </div>
        <div className="left-col">
          <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:4,letterSpacing:1.5}}>EQUIPMENT</div>
          <EquipPanel run={run} onUneq={doUneqEquip} onUpgrade={doUpgradeEquip} onEnhance={doEnhance} onReforge={doReforge} tip={tip} locked={inCombat} setHoverEquip={setHoverEquip} onToggleLock={doToggleLock}
            onSelectForUpgrade={(item,idx)=>setUpgradeTarget({item,source:"equip",idx})}/>
          {/* v6.5.3: Universal Upgrade Dropbox */}
          {liveUpgradeTarget&&<UniversalUpgradeBox item={liveUpgradeTarget.item} source={liveUpgradeTarget.source} idx={liveUpgradeTarget.idx} run={run} locked={inCombat}
            onClose={()=>setUpgradeTarget(null)}
            onUpgrade={(eqIdx,invIdx)=>{if(eqIdx!==null)doUpgradeEquip(eqIdx);else if(invIdx!==null)doUpgradeInv(invIdx)}}
            onEnhance={(eqIdx)=>{if(eqIdx!==null)doEnhance(eqIdx)}}
            onReforge={(eqIdx,subIdx,newKey,invIdx)=>{if(eqIdx!==null)doReforge(eqIdx,subIdx,newKey)}}/>}
        </div>
        <div className="center-col">
          <Arena run={run} anim={anim} castFx={castFx} onSkill={doSkill} onNext={doNext} onTarget={doTarget}
            onBreakthrough={doBreakthrough} onAutoToggle={doAutoToggle} onAutoSpeed={doAutoSpeed}
            onHuntReplay={doHuntReplay} onReturnMenu={onReturnMenu}/>
        </div>
        <div className="right-col">
          <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:4,letterSpacing:1.5}}>INVENTORY</div>
          <InvPanel run={run} onEquip={doEquip} onPickMerge={pickMerge} onUpgradeInv={doUpgradeInv}
            onDismantle={idx=>{const item=run.inventory[idx];if(item&&!inCombat&&!item.locked&&item.subtype!=="enhance_stone"&&item.subtype!=="reforge_stone")setDismTarget({item,idx})}}
            onBulkSell={doBulkSell} onToggleLockInv={doToggleLockInv} tip={tip} locked={inCombat} setHoverEquip={setHoverEquip}
            onSelectForUpgrade={(item,idx)=>setUpgradeTarget({item,source:"inv",idx})}/>
        </div>
        <div className="bottom-row">
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:6,letterSpacing:1.5}}>CHARACTER</div>
            <StatsPanel run={run} hoverEquip={hoverEquip}/>
          </div>
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:6,letterSpacing:1.5}}>MARTIAL ART</div>
            <MartialPanel run={run} onUneq={doUneqMartial} onSelMerge={selMerge} onMerge={doFuse} onCancelMerge={cancMerge} tip={tip} locked={inCombat}/>
          </div>
          <div className="card">
            <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:6,letterSpacing:1.5}}>FACTION & REALM</div>
            <PathPanel run={run} onChangeElem={()=>setShowElemChange(true)} onBreakthrough={doBreakthrough}/>
          </div>
        </div>
      </div>
      {run.phase==="loot"&&<LootModal loots={run.pendingLoot} expGain={run._lootExp||0} gold={run._lootGold||0} masteryGain={run._lootMastery||0} onCollect={collectLoot}/>}
      {run.phase==="dead"&&<DeathModal onMenu={onReturnMenu} onRetry={onRetry} onRetryStage={onRetryStage}/>}
      {run.phase==="victory"&&<VictoryModal onMenu={onReturnMenu} onEndless={onVictoryEndless}/>}
      {dismTarget&&<DismantleModal item={dismTarget.item} onConfirm={()=>{doDismantle(dismTarget.idx);setDismTarget(null)}} onCancel={()=>setDismTarget(null)}/>}
      {buffChoices&&<BuffPickModal choices={buffChoices.choices} onPick={doPickBuff}/>}
      {skillBranch&&<SkillBranchModal skillName={skillBranch.skillName} level={skillBranch.level} branches={skillBranch.branches} onPick={doPickSkillBranch}/>}
            {showEncyclopedia&&<EncyclopediaModal onClose={()=>setShowEncyclopedia(false)} run={run}/>}
      {showGuide&&<TravelerGuideModal onClose={()=>setShowGuide(false)} run={run} onAutoEquip={doAutoEquip}/>}
      {showElemChange&&<ElemChangeModal onSelect={doChangeElem} onCancel={()=>setShowElemChange(false)} currentElem={run.elemId}/>}
      <Tooltip tip={tip.tip} pos={tip.pos} equipped={tip.tipEq}/>
    </div>)}
  return null;
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  render(){
    if(this.state.hasError){
      return React.createElement('div',{style:{padding:20,color:'#ff4444',background:'#1a1a2e',fontFamily:'monospace',fontSize:20}},
        React.createElement('h2',null,'Game Error'),
        React.createElement('pre',{style:{whiteSpace:'pre-wrap',marginTop:10}},String(this.state.error)),
        React.createElement('button',{onClick:()=>this.setState({hasError:false}),style:{marginTop:10,padding:'8px 16px',cursor:'pointer'}},'Retry')
      );
    }
    return this.props.children;
  }
}

</script>
